<!--
  Shared icon sprite for InterAACtion Web.

  Style: 24×24 viewBox, two-tone (flat fills + small stroke accents).
  No gradients — keep symbols self-contained so <use href="…#id"> works
  cross-document without inheriting the parent SVG's gradient context.

  Colour roles, encoded as flat hex literals so the sprite is portable
  across light and dark themes:
    --c-blue:   #1856a7  (primary action)
    --c-mint:   #45c29a  (scene / nature)
    --c-peach:  #ff8a5b  (player / energy)
    --c-magenta:#c44db5  (gazeplay / play)
    --c-yellow: #ffbf47  (warning / target ring)
    --c-white:  #ffffff
    --c-line:   currentColor (for stroke-only action icons)

  Action icons stay stroke-based so they can pick up the host text
  colour via currentColor; app icons live on coloured tiles.

  Usage: <svg class="icon" aria-hidden="true">
           <use href="/assets/icons.svg#icon-home"/>
         </svg>

  License: written from scratch for this project. GPL-3.0-or-later.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ===== Brand ===== -->
  <symbol id="icon-logo" viewBox="0 0 24 24">
    <rect x="2" y="2" width="20" height="20" rx="6" fill="#1856a7"/>
    <rect x="2" y="2" width="20" height="20" rx="6" fill="#c44db5" opacity="0.55"/>
    <path d="M5 12c2-3 5-4.5 7-4.5s5 1.5 7 4.5c-2 3-5 4.5-7 4.5s-5-1.5-7-4.5z"
          fill="none" stroke="#ffffff" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="12" r="2.2" fill="#ffffff"/>
    <circle cx="12" cy="12" r="1" fill="#1856a7"/>
  </symbol>

  <!-- ===== Action icons (stroke, currentColor) ===== -->
  <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 11.5L12 4l9 7.5"/>
    <path d="M5.5 10v10h13V10"/>
    <path d="M10 20v-5.5h4V20"/>
  </symbol>

  <symbol id="icon-target" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="5"/>
    <circle cx="12" cy="12" r="1.5" fill="#ff8a5b" stroke="none"/>
  </symbol>

  <!-- Eye: outline currentColor, iris coloured for affordance -->
  <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2.5 12c2.5-4.5 5.5-7 9.5-7s7 2.5 9.5 7c-2.5 4.5-5.5 7-9.5 7s-7-2.5-9.5-7z"/>
    <circle cx="12" cy="12" r="3.2" fill="#1856a7" stroke="none"/>
    <circle cx="12.6" cy="11.4" r="0.9" fill="#ffffff" stroke="none"/>
  </symbol>

  <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 4l18 16"/>
    <path d="M10.7 6.1c.4-.07.85-.1 1.3-.1 4 0 7 2.5 9.5 7-.78 1.4-1.66 2.62-2.6 3.62"/>
    <path d="M6.1 7.4C4.6 8.7 3.4 10.2 2.5 12c2.5 4.5 5.5 7 9.5 7 1.4 0 2.7-.3 3.9-.8"/>
    <path d="M9.5 9.7a3.2 3.2 0 0 0 4.6 4.6"/>
  </symbol>

  <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 12H5"/>
    <path d="M11 19l-7-7 7-7"/>
  </symbol>

  <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 9 4.6V4.5a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </symbol>

  <!-- Calibrate: target reticle with peach centre to match warning palette -->
  <symbol id="icon-calibrate" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="2.5" x2="12" y2="6"/>
    <line x1="12" y1="18" x2="12" y2="21.5"/>
    <line x1="2.5" y1="12" x2="6" y2="12"/>
    <line x1="18" y1="12" x2="21.5" y2="12"/>
    <circle cx="12" cy="12" r="6"/>
    <circle cx="12" cy="12" r="1.6" fill="#ff8a5b" stroke="none"/>
  </symbol>

  <symbol id="icon-external" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 4h6v6"/>
    <path d="M20 4l-9 9"/>
    <path d="M19 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6"/>
  </symbol>

  <!-- ===== App icons (filled tile + white glyph) ===== -->

  <!-- AugCom: blue tile, white grid, one cell highlighted in peach -->
  <symbol id="icon-app-augcom" viewBox="0 0 24 24">
    <rect x="1" y="1" width="22" height="22" rx="6" fill="#1856a7"/>
    <rect x="4" y="4"  width="5.2" height="5.2" rx="1.2" fill="#ffffff"/>
    <rect x="9.8" y="4"  width="5.2" height="5.2" rx="1.2" fill="#ffffff" opacity="0.85"/>
    <rect x="15.6" y="4"  width="4.4" height="5.2" rx="1.2" fill="#ffffff" opacity="0.7"/>
    <rect x="4" y="9.8" width="5.2" height="5.2" rx="1.2" fill="#ff8a5b"/>
    <rect x="9.8" y="9.8" width="5.2" height="5.2" rx="1.2" fill="#ffffff" opacity="0.85"/>
    <rect x="15.6" y="9.8" width="4.4" height="5.2" rx="1.2" fill="#ffffff" opacity="0.7"/>
    <rect x="4" y="15.6" width="5.2" height="4.4" rx="1.2" fill="#ffffff" opacity="0.85"/>
    <rect x="9.8" y="15.6" width="5.2" height="4.4" rx="1.2" fill="#ffffff" opacity="0.7"/>
    <rect x="15.6" y="15.6" width="4.4" height="4.4" rx="1.2" fill="#ffffff" opacity="0.55"/>
  </symbol>

  <!-- Scene: mint tile, frame + horizon + sun -->
  <symbol id="icon-app-scene" viewBox="0 0 24 24">
    <rect x="1" y="1" width="22" height="22" rx="6" fill="#45c29a"/>
    <rect x="4.5" y="6" width="15" height="12" rx="2" fill="#ffffff" opacity="0.18"/>
    <circle cx="9" cy="10.5" r="1.7" fill="#ffbf47"/>
    <path d="M5 16.5l4-4.5 3.5 3.5 2.7-2.7L19 17.5" fill="none" stroke="#ffffff"
          stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="4.5" y="6" width="15" height="12" rx="2" fill="none" stroke="#ffffff"
          stroke-width="1.4"/>
  </symbol>

  <!-- Player: peach tile, white play button + sound waves -->
  <symbol id="icon-app-player" viewBox="0 0 24 24">
    <rect x="1" y="1" width="22" height="22" rx="6" fill="#ff8a5b"/>
    <circle cx="9.5" cy="12" r="6" fill="#ffffff"/>
    <path d="M8 9.4v5.2l4.4-2.6z" fill="#ff8a5b"/>
    <path d="M17 10c.6.5.9 1.2.9 2s-.3 1.5-.9 2" fill="none" stroke="#ffffff"
          stroke-width="1.6" stroke-linecap="round"/>
    <path d="M19 8.4c1 .9 1.6 2.2 1.6 3.6s-.6 2.7-1.6 3.6" fill="none" stroke="#ffffff"
          stroke-width="1.6" stroke-linecap="round"/>
  </symbol>

  <!-- GazePlay: magenta tile, eye with white sclera + blue iris -->
  <symbol id="icon-app-gazeplay" viewBox="0 0 24 24">
    <rect x="1" y="1" width="22" height="22" rx="6" fill="#c44db5"/>
    <path d="M3.5 12c2.2-3.6 5-5.6 8.5-5.6s6.3 2 8.5 5.6c-2.2 3.6-5 5.6-8.5 5.6S5.7 15.6 3.5 12z"
          fill="#ffffff"/>
    <circle cx="12" cy="12" r="3.4" fill="#1856a7"/>
    <circle cx="12.6" cy="11.4" r="0.95" fill="#ffffff"/>
  </symbol>

</svg>
