name: Build Scene

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "InterAACtionScene-AFSR commit SHA to build"
        required: true
        default: "5780df46d14c7399b8d986a47ad3f51c85e2ede1"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node 14 (Angular 9 toolchain)
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.4.0
        with:
          node-version: "14"

      - name: Clone InterAACtionScene-AFSR at the requested SHA
        run: |
          set -euo pipefail
          SHA="${{ github.event.inputs.sha }}"
          git clone https://github.com/AFSR/InterAACtionScene-AFSR.git upstream
          cd upstream
          git checkout "$SHA"
          git log -1 --pretty="%H %s"

      - name: Disable Angular service worker (portal owns the SW)
        working-directory: upstream
        run: |
          set -euo pipefail
          jq '(.. | objects | select(has("serviceWorker")) | .serviceWorker) |= false' \
            angular.json > angular.json.new
          mv angular.json.new angular.json
          ! grep -E '"serviceWorker":\s*true' angular.json

      - name: Install dependencies
        working-directory: upstream
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Build Scene (production, base-href /scene/)
        working-directory: upstream
        run: npx ng build --prod --base-href /scene/ --output-path dist

      - name: Strip leftover ngsw artefacts from dist
        working-directory: upstream
        run: |
          set -euo pipefail
          rm -f dist/ngsw.json dist/ngsw-worker.js dist/safety-worker.js dist/worker-basic.min.js

      - name: Replace apps/scene/dist in the host repo
        run: |
          set -euo pipefail
          rm -rf apps/scene/dist
          mkdir -p apps/scene
          cp -r upstream/dist apps/scene/dist
          cat > apps/scene/dist/BUILD_INFO.txt <<EOF
          Built from: https://github.com/AFSR/InterAACtionScene-AFSR
          SHA:        ${{ github.event.inputs.sha }}
          Built at:   $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          Workflow:   ${{ github.workflow }} (run ${{ github.run_id }})
          EOF

      - name: Inject gaze bridge into Scene index.html
        run: python3 scripts/patches/inject_gaze_bridge.py apps/scene/dist

      - name: Open a pull request with the new build
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          branch: bot/scene-${{ github.event.inputs.sha }}
          commit-message: |
            chore(scene): build from ${{ github.event.inputs.sha }}
          title: "chore(scene): build from ${{ github.event.inputs.sha }}"
          body: |
            Automated build of [AFSR/InterAACtionScene-AFSR](https://github.com/AFSR/InterAACtionScene-AFSR)
            pinned at `${{ github.event.inputs.sha }}`.

            - Angular 9 `--prod`, `--base-href /scene/`
            - Service worker disabled (portal owns SW scope `/`)
            - Gaze bridge injected
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          add-paths: |
            apps/scene/dist
